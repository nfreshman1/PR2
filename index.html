<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gibbon PR</title>
<style>
:root {
  --g900:#1A2E22; --g800:#1E7C4D; --g600:#2D9D6B; --g200:#D1FAE5; --g100:#F0FDF4;
  --b200:#DBEAFE; --b800:#1E40AF;
  --p200:#EDE9FE; --p800:#5B21B6;
  --a200:#FEF3C7; --a800:#92400E;
  --k200:#FCE7F3; --k800:#831843;
  --n50:#F9FAFB; --n100:#F3F4F6; --n200:#E5E7EB; --n300:#D1D5DB;
  --n400:#9CA3AF; --n500:#6B7280; --n700:#374151; --n900:#111827;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#EEF0F3;color:var(--n900);font-size:13px;overflow:hidden}

/* ── Layout ── */
.app{display:flex;flex-direction:column;height:100vh}
.hdr{display:flex;align-items:center;gap:10px;padding:0 16px;height:50px;background:var(--g900);flex-shrink:0}
.logo{font-size:15px;font-weight:600;color:#fff;letter-spacing:-.3px;white-space:nowrap;margin-right:4px}
.logo em{color:#52B788;font-style:normal}
.ctabs{display:flex;gap:3px}
.ctab{padding:5px 11px;border-radius:6px;border:1px solid transparent;color:rgba(255,255,255,.5);background:transparent;cursor:pointer;font-size:12px;font-weight:500;font-family:inherit;white-space:nowrap}
.ctab:hover{background:rgba(255,255,255,.1);color:#fff}
.ctab.on{background:rgba(255,255,255,.13);color:#fff;border-color:rgba(255,255,255,.18)}
.ctab.on.kc{background:rgba(82,183,136,.22);border-color:rgba(82,183,136,.4);color:#A7F0C6}
.ctab.on.pw{background:rgba(59,130,246,.22);border-color:rgba(59,130,246,.4);color:#93C5FD}
.ctab.on.ct{background:rgba(167,139,250,.22);border-color:rgba(167,139,250,.4);color:#C4B5FD}
.hdr-r{margin-left:auto;display:flex;align-items:center;gap:10px}
.ts{font-size:11px;color:rgba(255,255,255,.38)}
.rbtn{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:6px;color:rgba(255,255,255,.8);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit}
.rbtn:hover:not(:disabled){background:rgba(255,255,255,.18)}
.rbtn:disabled{opacity:.5;cursor:default}
.body{display:flex;flex:1;overflow:hidden}

/* ── Sidebar ── */
.sb{width:240px;flex-shrink:0;background:#fff;border-right:1px solid var(--n200);display:flex;flex-direction:column;overflow:hidden}
.sb-hd{padding:11px 12px 9px;border-bottom:1px solid var(--n100);flex-shrink:0}
.sb-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--n400);margin-bottom:8px}
.search{width:100%;padding:6px 10px;border:1px solid var(--n200);border-radius:6px;font-size:12px;background:var(--n50);color:var(--n900);font-family:inherit;outline:none}
.search:focus{border-color:var(--g600);background:#fff}
.frow{display:flex;gap:5px;margin-top:6px}
.fsel{flex:1;min-width:0;padding:5px 6px;border:1px solid var(--n200);border-radius:6px;font-size:11px;background:var(--n50);color:var(--n700);font-family:inherit;outline:none}
.fsel:focus{border-color:var(--g600)}
.rcount{font-size:10px;color:var(--n400);margin-top:6px}
.rlist{overflow-y:auto;flex:1}
.ri{padding:9px 12px;cursor:pointer;border-left:3px solid transparent;border-bottom:1px solid #FAFAFA}
.ri:hover{background:var(--n50)}
.ri.sel{background:var(--g100);border-left-color:var(--g800)}
.rname-row{display:flex;align-items:center;gap:5px;margin-bottom:2px}
.rname{font-size:12px;font-weight:600;color:var(--n900)}
.rdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.rdot.active{background:#22C55E}.rdot.warm{background:#F59E0B}.rdot.cold{background:var(--n300)}
.ro-row{display:flex;align-items:center;gap:5px;margin-bottom:5px}
.routlet{font-size:11px;color:var(--n400);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.otype{font-size:9px;font-weight:600;padding:1px 5px;border-radius:3px;text-transform:uppercase;letter-spacing:.03em;flex-shrink:0}
.otype.trade{background:var(--b200);color:var(--b800)}
.otype.biz{background:var(--p200);color:var(--p800)}
.otype.ms{background:var(--g200);color:#064E3B}
.rtags{display:flex;flex-wrap:wrap;gap:3px}
.tag{font-size:9px;font-weight:600;padding:2px 5px;border-radius:4px}
.tag.cdr{background:var(--g200);color:#064E3B}
.tag.market{background:var(--b200);color:var(--b800)}
.tag.finance{background:var(--p200);color:var(--p800)}
.tag.policy{background:var(--a200);color:var(--a800)}
.tag.esg{background:var(--k200);color:var(--k800)}
.tag.other{background:var(--n100);color:var(--n500)}

/* ── Feed ── */
.feed{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.ftabs{display:flex;align-items:center;background:#fff;border-bottom:1px solid var(--n200);padding:0 16px;flex-shrink:0}
.ftab{padding:11px 13px;font-size:12px;font-weight:500;color:var(--n500);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap}
.ftab:hover{color:var(--n900)}
.ftab.on{color:var(--g800);border-bottom-color:var(--g800)}
.fnote{margin-left:auto;font-size:11px;color:var(--n400)}
.fcontent{flex:1;overflow-y:auto;padding:16px}

/* ── Client news ── */
.cols{display:grid;gap:16px}
.cols.three{grid-template-columns:repeat(3,1fr)}
.cols.one{grid-template-columns:1fr;max-width:580px}
.col-hd{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px}
.col-ttl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.col-ttl.kc{color:var(--g800)}.col-ttl.pw{color:#1558B0}.col-ttl.ct{color:#5B21B6}
.col-ct{font-size:10px;color:var(--n400)}
.acard{background:#fff;border:1px solid var(--n200);border-radius:8px;padding:12px 14px;margin-bottom:8px}
.acard:hover{border-color:var(--g600)}
.adom{font-size:10px;font-weight:600;color:var(--n400);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.atitle{font-size:12px;font-weight:500;color:var(--n900);line-height:1.45;margin-bottom:4px;text-decoration:none;display:block}
.atitle:hover{color:var(--g800)}
.ameta{font-size:10px;color:var(--n400)}
.nbadge{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;background:var(--b200);color:var(--b800);text-transform:uppercase}

/* ── Reporter card ── */
.rcard{background:#fff;border:1px solid var(--n200);border-radius:10px;overflow:hidden;margin-bottom:14px}
.rc-identity{padding:16px 18px 14px;border-bottom:1px solid var(--n100)}
.rc-top{display:flex;align-items:flex-start;gap:13px;margin-bottom:10px}
.avatar{width:44px;height:44px;border-radius:50%;background:var(--g200);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#064E3B;flex-shrink:0}
.rc-name{font-size:16px;font-weight:700;color:var(--n900);display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:2px}
.rc-sub{font-size:12px;color:var(--n500);margin-bottom:1px}
.rc-loc{font-size:11px;color:var(--n400)}
.rc-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.rel-badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:10px}
.rel-badge.active{background:var(--g200);color:#065F46}
.rel-badge.warm{background:var(--a200);color:var(--a800)}
.rel-badge.cold{background:var(--n100);color:var(--n500)}
.rc-actions{display:flex;gap:6px;flex-wrap:wrap}
.btn-li{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;background:#0A66C2;color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;text-decoration:none;font-family:inherit}
.btn-li:hover{background:#004182}
.btn-sec{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;background:var(--n100);color:var(--n700);border:1px solid var(--n200);border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;font-family:inherit;text-decoration:none}
.btn-sec:hover{background:var(--n200)}

/* ── Themes section ── */
.rc-themes{padding:14px 18px;border-bottom:1px solid var(--n100)}
.sect-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--n400);margin-bottom:2px;display:flex;align-items:baseline;gap:8px}
.sect-sub{font-size:10px;color:var(--n400);font-weight:400;text-transform:none;letter-spacing:0}
.themes-wrap{margin-top:10px}
.theme-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.theme-lbl{font-size:11px;font-weight:500;color:var(--n700);width:136px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.theme-bar-bg{flex:1;height:7px;background:var(--n100);border-radius:4px;overflow:hidden}
.theme-bar{height:100%;border-radius:4px;background:var(--g600)}
.theme-ct{font-size:10px;color:var(--n400);width:26px;text-align:right;flex-shrink:0}
.theme-empty{font-size:12px;color:var(--n400);padding:10px 0}

/* ── Articles section ── */
.rc-articles{padding:14px 18px}
.byline-note{font-size:10px;color:var(--n400);background:var(--a200);border-radius:5px;padding:5px 9px;margin-bottom:10px;display:inline-block}
.art-row{padding:10px 0;border-bottom:1px solid var(--n100)}
.art-row:last-child{border-bottom:none}
.art-title{font-size:12px;font-weight:500;color:var(--n900);line-height:1.45;text-decoration:none;display:block;margin-bottom:3px}
.art-title:hover{color:var(--g800)}
.art-meta{font-size:10px;color:var(--n400)}
.art-desc{font-size:11px;color:var(--n500);line-height:1.5;margin-top:4px}

/* ── Notes inline ── */
.rc-notes-inline{margin:0 18px 10px;background:#FFFBEB;border:1px solid #FDE68A;border-left:3px solid #F59E0B;border-radius:7px;padding:10px 12px}
.rc-notes-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--a800);margin-bottom:4px}
.rc-notes-txt{font-size:12px;color:var(--n700);line-height:1.6}

/* ── Background ── */
.rc-bio{padding:14px 18px;border-top:1px solid var(--n100)}
.bio-txt{font-size:12px;color:var(--n700);line-height:1.65;background:var(--n50);border-radius:7px;padding:11px 13px}

/* ── No RSS ── */
.no-rss{font-size:12px;color:var(--n400);padding:14px 18px;background:var(--n50);border-radius:6px;line-height:1.6}

/* ── Loading / empty ── */
.loading{display:flex;align-items:center;justify-content:center;gap:9px;padding:48px 24px;color:var(--n400);font-size:12px}
.spin{width:16px;height:16px;border:2px solid var(--n200);border-top-color:var(--g800);border-radius:50%;animation:sp .65s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{padding:32px 24px;text-align:center;color:var(--n400);font-size:12px;line-height:1.7}
.empty strong{display:block;color:var(--n500);margin-bottom:3px}

/* ── Modal ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center}
.overlay.show{display:flex}
.modal{background:#fff;border-radius:12px;padding:22px;width:460px;max-width:calc(100vw - 40px);box-shadow:0 20px 60px rgba(0,0,0,.18)}
.modal h3{font-size:15px;font-weight:700;color:var(--n900);margin-bottom:14px}
.form-row{margin-bottom:12px}
.form-lbl{font-size:11px;font-weight:600;color:var(--n500);margin-bottom:5px;display:block}
.form-sel,.form-input{width:100%;padding:7px 10px;border:1px solid var(--n200);border-radius:6px;font-size:12px;font-family:inherit;color:var(--n700);background:var(--n50);outline:none}
.form-sel:focus,.form-input:focus{border-color:var(--g600);background:#fff}
.form-ta{width:100%;height:120px;padding:8px 10px;border:1px solid var(--n200);border-radius:6px;font-size:12px;font-family:inherit;color:var(--n700);background:var(--n50);resize:vertical;outline:none}
.form-ta:focus{border-color:var(--g600);background:#fff}
.modal-btns{display:flex;justify-content:flex-end;gap:7px;margin-top:14px}
.btn-save{padding:7px 16px;background:var(--g800);color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-save:hover{background:#166035}
</style>
</head>
<body>
<div class="app">

  <div class="hdr">
    <span class="logo">Gibbon <em>PR</em></span>
    <div class="ctabs" id="ctabs">
      <button class="ctab on" onclick="selClient('all')">All clients</button>
      <button class="ctab kc" onclick="selClient('key-carbon')">Key Carbon</button>
      <button class="ctab pw" onclick="selClient('pinwheel')">Pinwheel</button>
      <button class="ctab ct" onclick="selClient('counteract')">Counteract</button>
    </div>
    <div class="hdr-r">
      <span class="ts" id="ts">Loading…</span>
      <button class="rbtn" id="rbtn" onclick="refreshAll()">↻ Refresh all</button>
    </div>
  </div>

  <div class="body">
    <div class="sb">
      <div class="sb-hd">
        <div class="sb-lbl">Reporters <span id="rcount" style="font-weight:400;text-transform:none;letter-spacing:0;font-size:10px"></span></div>
        <input class="search" id="search" type="search" placeholder="Search name or outlet…" oninput="filterReporters()">
        <div class="frow">
          <select class="fsel" id="ftype" onchange="filterReporters()">
            <option value="">All types</option>
            <option value="Trade Press">Trade press</option>
            <option value="Business / Financial">Business</option>
            <option value="Mainstream">Mainstream</option>
          </select>
          <select class="fsel" id="fbeat" onchange="filterReporters()">
            <option value="">All beats</option>
            <option value="CDR">CDR</option>
            <option value="Direct Air Capture">DAC</option>
            <option value="Voluntary Carbon Markets">VCM</option>
            <option value="Compliance Markets">Compliance</option>
            <option value="Climate Finance">Finance</option>
            <option value="Climate Policy">Policy</option>
            <option value="EU Policy">EU policy</option>
            <option value="Corporate Climate">ESG</option>
          </select>
        </div>
      </div>
      <div class="rlist" id="rlist"></div>
    </div>

    <div class="feed">
      <div class="ftabs">
        <div class="ftab on" id="tab-news" onclick="setTab('news')">Client news</div>
        <div class="ftab" id="tab-rep" style="display:none" onclick="setTab('reporter')">Reporter</div>
        <span class="fnote" id="fnote"></span>
      </div>
      <div class="fcontent" id="fcontent">
        <div class="loading"><div class="spin"></div>Fetching RSS feeds…</div>
      </div>
    </div>
  </div>
</div>

<!-- Notes modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h3 id="modal-ttl">Notes</h3>
    <div class="form-row">
      <label class="form-lbl">Relationship status</label>
      <select class="form-sel" id="m-rel">
        <option value="Cold">Cold</option>
        <option value="Warm">Warm</option>
        <option value="Active">Active</option>
      </select>
    </div>
    <div class="form-row">
      <label class="form-lbl">Last contact</label>
      <input class="form-input" id="m-last" type="text" placeholder="e.g. June 15 — emailed about DAC story">
    </div>
    <div class="form-row">
      <label class="form-lbl">Notes (pitch angles, background, context)</label>
      <textarea class="form-ta" id="m-notes" placeholder="What pitch landed? What are they working on? What not to send?"></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn-sec" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveNotes()">Save</button>
    </div>
  </div>
</div>

<script>
// ─── Reporter data (Notion, synced 2026-06-30) ────────────────────────────────
const REPORTERS = [
  {name:"Matteo Civillini",outlet:"Climate Home News",ot:"Trade Press",loc:"London, UK",beats:["Voluntary Carbon Markets","Climate Finance","Article 6","MRV"],clients:["Key Carbon","Pinwheel","Counteract"],li:"https://www.linkedin.com/in/matteo-civillini",rss:"https://www.climatechangenews.com/feed/",rel:"Cold",yrs:"4+",bio:"Reporter at Climate Home News since February 2023. Specialises in accountability journalism on climate finance and carbon markets. Also covers UN climate diplomacy. Strong investigative track record on VCM integrity and finance flows."},
  {name:"Brad Plumer",outlet:"New York Times",ot:"Mainstream",loc:"Washington DC, USA",beats:["Climate Policy","IRA / US Policy","CDR","CCS / CCUS"],clients:["Key Carbon","Pinwheel","Counteract"],li:"https://www.linkedin.com/in/brad-plumer-a2297515/",rss:"https://rss.nytimes.com/services/xml/rss/nyt/Climate.xml",rel:"Cold",yrs:"12+",bio:"Climate reporter at the New York Times, based in Washington. Covers the US energy transition, climate policy, IRA implementation, and decarbonization technology including CCS and CDR. Previously senior editor at Vox. Among the most read climate journalists in America."},

  {name:"Chloé Farand",outlet:"Climate Home News",ot:"Trade Press",loc:"London, UK",beats:["Climate Policy","EU Policy","Climate Finance"],clients:["Key Carbon","Pinwheel","Counteract"],li:"https://www.linkedin.com/in/chloe-farand",rss:"https://www.climatechangenews.com/feed/",rel:"Cold",yrs:"7+",bio:"Reporter at Climate Home News leading the Clean Energy Frontier series. Covers European and international climate policy."},
  {name:"Oliver Milman",outlet:"The Guardian",ot:"Mainstream",loc:"New York, USA",beats:["Climate Policy","Corporate Climate / ESG","Nature-based Solutions"],clients:["Key Carbon","Pinwheel","Counteract"],li:"https://www.linkedin.com/in/oliver-milman",rss:"https://www.theguardian.com/environment/rss",rel:"Cold",yrs:"13+",bio:"Environmental Correspondent at The Guardian US, based in New York. Covers US environmental policy, corporate climate, and nature. One of the most prolific environmental journalists at a major English-language outlet."},
  {name:"Eric Roston",outlet:"Bloomberg Green",ot:"Business / Financial",loc:"United States",beats:["Climate Policy","Climate Finance","CDR"],clients:["Key Carbon","Pinwheel","Counteract"],li:"https://www.linkedin.com/in/eric-roston",rss:"https://feeds.bloomberg.com/green/news.rss",rel:"Cold",yrs:"10+",bio:"Reporter at Bloomberg Green. Covers climate and energy broadly with a focus on the science and economics of decarbonization."},

  {name:"Sara Stefanini",outlet:"Carbon Pulse",ot:"Trade Press",loc:"London, UK",beats:["Climate Policy","EU Policy","Compliance Markets","Voluntary Carbon Markets"],clients:["Key Carbon","Pinwheel","Counteract"],li:"https://www.linkedin.com/in/sara-stefanini",rss:null,rel:"Cold",yrs:"15+",bio:"EMEA Policy Editor at Carbon Pulse. 15 years in journalism covering energy, climate, and environment. Previously senior energy and climate policy reporter at Politico Europe (Brussels)."},
  {name:"Akshat Rathi",outlet:"Bloomberg Green",ot:"Business / Financial",loc:"London, UK",beats:["CDR","Climate Finance","Climate Policy","Voluntary Carbon Markets","Climate Tech VC"],clients:["Key Carbon","Pinwheel","Counteract"],li:"https://uk.linkedin.com/in/akshatrathi",rss:"https://feeds.bloomberg.com/green/news.rss",rel:"Cold",yrs:"10+",bio:"Senior Reporter at Bloomberg News. One of the highest-profile climate journalists globally. PhD chemistry from Oxford. Hosts the Zero podcast. Co-authored major investigations into carbon credit integrity."},
  {name:"Julian Spector",outlet:"Canary Media",ot:"Trade Press",loc:"United States",beats:["Climate Finance","Climate Tech VC","IRA / US Policy"],clients:["Key Carbon","Pinwheel","Counteract"],li:"https://www.linkedin.com/in/julian-spector",rss:"https://www.canarymedia.com/rss",rel:"Cold",yrs:"7+",bio:"Senior Reporter at Canary Media. Covers long-duration energy storage, batteries, and clean energy finance. Strong on climate tech investment and the economics of the energy transition."},

function rssProxyUrl(feedUrl) {
  if (!IS_LOCAL) return `/api/rss?url=${encodeURIComponent(feedUrl)}`;

  return `https://api.allorigins.win/get?url=${encodeURIComponent(feedUrl)}`;
}

function fmtDate(d) {
  if(!d) return '';
  const dt = parseDate(d);
  if(!dt) return '';
  const diff = Math.floor((Date.now()-dt)/86400000);
  if(diff===0) return 'Today';
  if(diff===1) return 'Yesterday';
  if(diff<7)   return diff+'d ago';
  return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:dt.getFullYear()!==new Date().getFullYear()?'numeric':undefined});
}
const stripHtml = h => (h||'').replace(/<[^>]*>/g,'').replace(/\s+/g,' ').trim();
const domain    = u => { try{return new URL(u).hostname.replace(/^www\./,'');}catch{return '';} };
const cutoff90  = () => new Date(Date.now()-NINETY);

// rss2json returns "2024-12-15 10:30:00" (space separator) which many browsers
// reject as Invalid Date. Replace the space with T to get ISO 8601.
function parseDate(d) {
  if(!d) return null;
  const dt = new Date(typeof d === 'string' ? d.replace(' ','T') : d);
  return isNaN(dt.getTime()) ? null : dt;
}

// Lenient byline match: last name only (≥4 chars) is enough for uniqueness
function bylineMatch(author, name) {
  if(!author) return false;
  const a = author.toLowerCase();
  const parts = name.toLowerCase().split(' ');
  const last = parts[parts.length-1];
  if(last.length >= 4 && a.includes(last)) return true;
  return a.includes(name.toLowerCase());
}

// Parse RSS XML (used as fallback when rss2json fails)
function parseRssXml(xml) {
  try {
    const doc = new DOMParser().parseFromString(xml, 'application/xml');
    const isAtom = !!doc.querySelector('feed');
    const items = [...doc.querySelectorAll(isAtom ? 'entry' : 'item')];
    return items.map(item => {
      const txt = (...sels) => { for(const s of sels){ const e=item.querySelector(s); if(e?.textContent?.trim()) return e.textContent.trim(); } return ''; };
      const link = item.querySelector('link');
      return {
        title:  txt('title'),
        url:    link?.getAttribute('href') || link?.textContent?.trim() || txt('guid'),
        date:   txt('pubDate','published','updated'),
        author: txt('author > name','creator','dc\\:creator','author'),
        desc:   stripHtml(txt('description','summary','content')).slice(0,220),
      };
    }).filter(a => a.url && a.title);
  } catch(e) { return []; }
}

// ─── Theme extraction ─────────────────────────────────────────────────────────
function extractThemes(articles) {
  const counts = {};
  const cut = cutoff90();
  // Use parseDate to avoid Invalid Date NaN comparisons
  const recent = articles.filter(a => {
    const dt = parseDate(a.date);
    return !dt || dt >= cut; // include if date is unparseable
  });
  for(const art of recent) {
    const text = (art.title+' '+(art.desc||'')).toLowerCase();
    const matched = new Set();
    for(const th of THEMES) {
      if(matched.has(th.id)) continue;
      if(th.kw.some(k=>text.includes(k))) {
        counts[th.id] = (counts[th.id]||0)+1;
        matched.add(th.id);
      }
    }
  }
  return Object.entries(counts)
    .map(([id,ct])=>({...THEMES.find(t=>t.id===id),count:ct}))
    .sort((a,b)=>b.count-a.count)
    .slice(0,6);
}

// ─── RSS fetching ─────────────────────────────────────────────────────────────
function withTimeout(promise, ms) {
  return Promise.race([
    promise,
    new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), ms))
  ]);
}

async function fetchFeed(rssUrl) {
  if (S.feeds[rssUrl] !== undefined) return S.feeds[rssUrl];
  S.feeds[rssUrl] = null; // loading sentinel

  try {
    const proxyUrl = rssProxyUrl(rssUrl);
    const r = await withTimeout(fetch(proxyUrl), 10000);

    if (!r.ok) throw new Error(`HTTP ${r.status}`);

    let xml;
    if (IS_LOCAL) {
      // allorigins wraps the response: {"contents":"...xml...","status":{...}}
      const d = await r.json();
      xml = d.contents;
      if (!xml) throw new Error('allorigins returned empty contents');
    } else {
      xml = await r.text();
    }

    const items = parseRssXml(xml);
    S.feeds[rssUrl] = items;
    S.feedStatus[rssUrl] = items.length ? 'ok' : 'empty';
  } catch (e) {
    console.warn('Feed failed:', rssUrl, e.message);
    S.feeds[rssUrl] = [];
    S.feedStatus[rssUrl] = 'error: ' + e.message;
  }

  return S.feeds[rssUrl];
}

function byDate(a, b) {
  return (parseDate(b.date)||new Date(0)) - (parseDate(a.date)||new Date(0));
}

function articlesForReporter(r) {
  if(!r.rss) return { articles:[], bylineFiltered:false, noRss:true };
  const all = S.feeds[r.rss];
  // null = still loading, undefined = not requested yet
  if(all===null || all===undefined) return { articles:[], loading:true };

  const sorted = [...all].sort(byDate);

  // Try byline filter — lenient last-name match
  const byline = sorted.filter(a => bylineMatch(a.author, r.name));
  if(byline.length >= 2) return { articles:byline, bylineFiltered:true };

  // Fallback: show all articles from the outlet feed (no byline in feed)
  return { articles:sorted.slice(0,20), bylineFiltered:false };
}

function articlesForClient(clientId) {
  const name = CLIENTS.find(c=>c.id===clientId)?.name;
  const reps  = clientId==='all' ? REPORTERS : REPORTERS.filter(r=>r.clients.includes(name));
  const feeds = [...new Set(reps.map(r=>r.rss).filter(Boolean))];
  const seen  = new Set(), arts = [];
  for(const f of feeds) {
    const items = S.feeds[f];
    if(!items) continue;
    for(const a of items) {
      if(a.url&&!seen.has(a.url)) { seen.add(a.url); arts.push(a); }
    }
  }
  arts.sort(byDate);
  return arts.slice(0,20);
}

async function loadAllFeeds() {
  S.loading = true;
  S.feedStatus = {};
  renderFeed();

  const allFeeds = [...new Set(REPORTERS.map(r => r.rss).filter(Boolean))];
  await Promise.all(allFeeds.map(fetchFeed));

  Object.values(S.feeds).flat().filter(Boolean).forEach(a => { if (a?.url) S.seen.add(a.url); });
  S.updated = new Date();
  S.loading = false;

  const okCount  = Object.values(S.feedStatus).filter(v => v.startsWith('ok')).length;
  const errCount = allFeeds.length - okCount;
  const fnote = document.getElementById('fnote');
  if (fnote) {
    if (errCount === 0) {
      fnote.textContent = `${okCount} feeds loaded`;
      fnote.style.color = '';
    } else {
      fnote.innerHTML = `${okCount}/${allFeeds.length} feeds loaded · <button onclick="showDiag()" style="background:none;border:none;color:inherit;cursor:pointer;text-decoration:underline;font-size:inherit;padding:0">see details</button>`;
      fnote.style.color = '#B45309';
    }
  }

  renderHeader();
  renderFeed();
}

function showDiag() {
  const lines = Object.entries(S.feedStatus).map(([url, status]) => {
    const icon = status.startsWith('ok') ? '✓' : '✗';
    const count = (S.feeds[url]||[]).length;
    const host  = new URL(url).hostname.replace('www.','');
    return `${icon} ${host} — ${status.startsWith('ok') ? count + ' articles' : status}`;
  }).join('\n');
  alert('Feed diagnostics (copy and share if reporting an issue):\n\n' + lines);
}

  document.getElementById('modal-ttl').textContent='Notes: '+name;
  document.getElementById('m-rel').value=n.rel||getRelFromNotes(name);
  document.getElementById('m-last').value=n.last||'';
  document.getElementById('m-notes').value=n.text||'';
  document.getElementById('overlay').classList.add('show');
}
function closeModal(){ document.getElementById('overlay').classList.remove('show'); }
function saveNotes() {
  const nm=S.modalFor;
  S.notes[nm]={
    rel:  document.getElementById('m-rel').value,
    last: document.getElementById('m-last').value.trim(),
    text: document.getElementById('m-notes').value.trim(),
  };
  try{ localStorage.setItem(NOTES_KEY,JSON.stringify(S.notes)); }catch{}
  closeModal();
  if(S.reporter?.name===nm)renderFeed();
}
document.getElementById('overlay').addEventListener('click',e=>{ if(e.target===e.currentTarget)closeModal(); });

// ─── Rendering ────────────────────────────────────────────────────────────────
function renderAll(){ renderHeader(); renderSidebar(); renderFeed(); }

function renderHeader() {
  const el=document.getElementById('ctabs');
  if(!el)return;
  const inNews=S.tab==='news';
  el.innerHTML=`<button class="ctab${inNews&&S.client==='all'?' on':''}" onclick="selClient('all')">All clients</button>`+
    CLIENTS.map(c=>`<button class="ctab ${c.cls}${inNews&&S.client===c.id?' on':''}" onclick="selClient('${c.id}')">${c.name}</button>`).join('');
  const ts=document.getElementById('ts');
  if(ts)ts.textContent=S.updated?'Updated '+S.updated.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'Loading feeds…';
}

function renderSidebar() {
  const el=document.getElementById('rlist'), ct=document.getElementById('rcount');
  if(!el)return;
  if(ct)ct.textContent='· '+S.filtered.length+'/'+REPORTERS.length;
  if(!S.filtered.length){el.innerHTML='<div class="empty"><strong>No results</strong>Adjust your filters.</div>';return;}
  el.innerHTML=S.filtered.map(r=>{
    const sel=S.reporter?.name===r.name;
    const notesRel=S.notes[r.name]?.rel||r.rel;
    const rc=relCls(notesRel);
    const tags=r.beats.slice(0,3).map(t=>`<span class="tag ${tagCls(t)}">${abbr(t)}</span>`).join('');
    const sn=r.name.replace(/'/g,"\\'");
    return `<div class="ri${sel?' sel':''}" onclick="selReporter('${sn}')">
      <div class="rname-row"><span class="rname">${r.name}</span><span class="rdot ${rc}" title="${notesRel}"></span></div>
      <div class="ro-row"><span class="routlet">${r.outlet}</span><span class="otype ${otCls(r.ot)}">${otLbl(r.ot)}</span></div>
      <div class="rtags">${tags}</div>
    </div>`;
  }).join('');
}

function renderFeed() {
  const el=document.getElementById('fcontent');
  const tab2=document.getElementById('tab-rep');
  if(!el)return;
  if(tab2){ tab2.style.display=S.reporter?'block':'none'; if(S.reporter)tab2.textContent=S.reporter.name.split(' ')[0]; }
  document.getElementById('tab-news')?.classList.toggle('on',S.tab==='news');
  document.getElementById('tab-rep')?.classList.toggle('on',S.tab==='reporter');

  if(S.tab==='reporter'&&S.reporter){ renderReporterCard(); return; }
  if(S.loading){el.innerHTML='<div class="loading"><div class="spin"></div>Fetching RSS feeds…</div>';return;}

  const show=S.client==='all'?CLIENTS:CLIENTS.filter(c=>c.id===S.client);
  const grid=show.length===1?'one':'three';
  el.innerHTML=`<div class="cols ${grid}">` + show.map(c=>{
    const arts=articlesForClient(c.id);
    return `<div>
      <div class="col-hd"><span class="col-ttl ${c.cls}">${c.name}</span><span class="col-ct">${arts.length} articles</span></div>
      ${arts.length?arts.map(a=>newsCard(a,!S.seen.has(a.url))).join(''):`<div class="empty"><strong>No articles</strong>Feeds may be unavailable.</div>`}
    </div>`;
  }).join('') + '</div>';
}

function renderReporterCard() {
  const r=S.reporter;
  const el=document.getElementById('fcontent');
  const notes=S.notes[r.name]||{};
  const rel=notes.rel||r.rel;
  const rc=relCls(rel);
  const sn=r.name.replace(/'/g,"\\'");
  const beats=r.beats.map(t=>`<span class="tag ${tagCls(t)}">${t}</span>`).join('');

  // Article data
  const { articles, bylineFiltered, noRss, loading } = articlesForReporter(r);
  const themes = articles.length ? extractThemes(articles) : [];
  const cut = cutoff90();
  // Use parseDate so "2024-12-15 10:30:00" format doesn't produce NaN comparisons
  const artCount = articles.filter(a => { const dt=parseDate(a.date); return !dt||dt>=cut; }).length;

  // Themes HTML
  let themesHtml='';
  if(noRss) {
    themesHtml=`<div class="theme-empty">No public RSS — Carbon Pulse is subscription-only. Monitor via their daily newsletter.</div>`;
  } else if(loading||S.feeds[r.rss]===null) {
    themesHtml=`<div class="loading" style="padding:12px 0"><div class="spin"></div>Loading articles…</div>`;
  } else if(themes.length===0) {
    themesHtml=`<div class="theme-empty">Not enough recent articles to surface themes yet.</div>`;
  } else {
    const max=themes[0].count;
    themesHtml=`<div class="themes-wrap">`+themes.map(th=>`
      <div class="theme-row">
        <span class="theme-lbl">${th.label}</span>
        <div class="theme-bar-bg"><div class="theme-bar" style="width:${Math.round(th.count/max*100)}%;background:${THEME_COLOR[th.id]||'var(--g600)'}"></div></div>
        <span class="theme-ct">${th.count}</span>
      </div>`).join('')+`</div>`;
  }

  // Articles HTML
  let artsHtml='';
  if(noRss) {
    artsHtml='';
  } else if(loading||S.feeds[r.rss]===null) {
    artsHtml='<div class="loading"><div class="spin"></div>Fetching RSS feed…</div>';
  } else if(articles.length===0) {
    artsHtml='<div class="empty"><strong>No articles found</strong>This feed may require a subscription or the URL has changed.</div>';
  } else {
    const sorted=[...articles].sort((a,b)=>new Date(b.date)-new Date(a.date));
    artsHtml=sorted.map(a=>`
      <div class="art-row">
        <a class="art-title" href="${a.url}" target="_blank">${a.title||'Untitled'}</a>
        <div class="art-meta">${fmtDate(a.date)}${a.author&&!bylineFiltered?' · '+a.outlet:''}</div>
        ${a.desc?`<div class="art-desc">${a.desc}</div>`:''}
      </div>`).join('');
  }

  const bylineNoteHtml = !noRss && !loading && articles.length>0 && !bylineFiltered
    ? `<div class="byline-note">⚠ Showing all articles from ${r.outlet} — author not in feed, can't filter by byline</div>` : '';

  el.innerHTML=`
    <div class="rcard">

      <!-- Identity -->
      <div class="rc-identity">
        <div class="rc-top">
          <div class="avatar">${ini(r.name)}</div>
          <div style="flex:1;min-width:0">
            <div class="rc-name">${r.name}<span class="rel-badge ${rc}">${rel}</span></div>
            <div class="rc-sub">${r.outlet} · ${r.yrs} yrs on beat</div>
            <div class="rc-loc">${r.loc||''}</div>
          </div>
        </div>
        ${beats?`<div class="rc-tags" style="margin-bottom:12px">${beats}</div>`:''}
        <div class="rc-actions">
          ${r.li?`<a class="btn-li" href="${r.li}" target="_blank">in LinkedIn</a>`:''}
          <button class="btn-sec" onclick="openModal('${sn}')">✎ Notes</button>
          ${r.rss?`<a class="btn-sec" href="${r.rss}" target="_blank">RSS ↗</a>`:''}
        </div>
      </div>

      <!-- Dominant themes -->
      <div class="rc-themes">
        <div class="sect-lbl">
          Dominant themes · last 90 days
          ${artCount>0?`<span class="sect-sub">${bylineFiltered?artCount+' byline articles':artCount+' outlet articles'}</span>`:''}
        </div>
        ${themesHtml}
      </div>

      <!-- Notes (if set) -->
      ${(notes.text||notes.last)?`
        <div class="rc-notes-inline" style="margin:0;border-radius:0;border-left-width:0;border-right:none;border-left:3px solid #F59E0B">
          <div class="rc-notes-lbl">Notes${notes.last?' · Last contact: '+notes.last:''}</div>
          ${notes.text?`<div class="rc-notes-txt">${notes.text}</div>`:''}
        </div>`:''}

      <!-- Articles -->
      <div class="rc-articles">
        <div class="sect-lbl" style="margin-bottom:8px">
          Recent articles · newest first
          ${articles.length?`<span class="sect-sub">${articles.length} in feed</span>`:''}
        </div>
        ${bylineNoteHtml}
        ${artsHtml}
      </div>

      <!-- Background -->
      ${r.bio?`<div class="rc-bio"><div class="sect-lbl" style="margin-bottom:8px">Background</div><div class="bio-txt">${r.bio}</div></div>`:''}

    </div>`;
}

function newsCard(a, isNew) {
  return `<div class="acard">
    <div class="adom">${domain(a.url)||a.outlet||''}${isNew?'<span class="nbadge">New</span>':''}</div>
    <a class="atitle" href="${a.url}" target="_blank">${a.title||'Untitled'}</a>
    <div class="ameta">${fmtDate(a.date)}${a.author?' · '+a.author:''}</div>
  </div>`;
}

// ─── Init ─────────────────────────────────────────────────────────────────────
renderSidebar();
renderHeader();
loadAllFeeds();
</script>
</body>
</html>
